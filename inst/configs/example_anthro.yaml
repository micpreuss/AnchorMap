# AnchorMap — EXAMPLE config: single-category track via the rg long-table (Input A).
# A template documenting every field. Two kinds of things to adapt to YOUR data:
#   1) the input PATHS in the first block (rg_long / ontology / out_dir);
#   2) the SETTINGS that must match your column names/values — trait_group, ontology_key, levels,
#      primary_level (flagged "match to your data" below).
# inst/fixtures/example_rg_long.tsv shows the 12-column long-table schema (that file is the disease
# track — keyed on trait_category; this anthro template instead joins on trait_id). Then run:
#   anchor_map --config example_anthro.yaml --out-dir results/anthro --threads 4
# For a runnable, self-contained smoke that needs no external data, use `synthetic_rds` instead.

run_label: example_anthro

# ---- inputs: paths to YOUR files ----
# A: cluster x trait rg long-table. Required columns: cluster_label, trait_id, trait_category,
#    trait_group, rg, rg_se, p, h2_trait, h2_trait_se, ldsc_converged, negative_h2, status.
#    (see inst/fixtures/example_rg_long.tsv for a concrete example of this schema)
rg_long: path/to/cluster_trait_rg_long.tsv
# D: ontology TSV. Here keyed on trait_id with a single class level (e.g. body-size traits).
ontology: path/to/anthro_ontology.tsv
out_dir: results/example_anthro

# ---- trait universe / LDSC reliability gate (match to your data) ----
trait_group: disease            # a value present in your long-table's trait_group column
require_ldsc_converged: true
drop_negative_h2: true
h2_z_threshold: 4.0             # gate: h2_trait / h2_trait_se > this

# ---- ontology: join key + levels to score (match to YOUR ontology's columns) ----
ontology_key: trait_id          # the column shared by long-table & ontology (trait_id or trait_category)
levels: [anthro_class]          # ontology column(s) to score — must be column names in your ontology TSV
primary_level: anthro_class     # which of `levels` drives the auto-label
min_category_n: 3

# ---- competitive enrichment ----
rank_variable: abs_z
permutation_K: 2000
random_seed: 1
vif_correlation: auto           # trait_rg (if coverage >= vif_coverage_min) -> cluster_profile -> VIF=1
vif_coverage_min: 0.5
# B: trait x trait LDSC --rg summary (p1, p2, rg, ..., CONVERGED). Used when vif_correlation
#    resolves to trait_rg. Omit to force the cluster-profile proxy.
# trait_rg_matrix: path/to/trait_trait_rg.summary.tsv
trait_rg_require_converged: true
vif_min_rho: 0.0

# ---- over-representation (Fisher) ----
hit_abs_rg: 0.2
hit_bonferroni: true

# ---- auto-label rule ----
label_q_max: 0.05
label_auc_min: 0.60

# ---- anchor shape ----
shape_margin_sharp: 0.10
shape_margin_diffuse: 0.05
shape_focus_diffuse: 3.0

# ---- Phase 6: uncertainty quantification (additive) ----
# Appends a redundancy-aware 95% CI to every AUC (auc_abs_se/ci_lo/ci_hi) and a Monte-Carlo support
# score to every anchor-shape call (shape_confidence, anchor_focus_ci_lo/hi, shape_posterior,
# shape_jackknife_stable). Set emit_uncertainty: false to reproduce the Phase-5 contracts exactly.
emit_uncertainty: true
auc_ci_method: delong         # delong (nonparametric) | hanley (closed form)
auc_ci_level: 0.95
shape_confidence_B: 2000      # MC draws for the shape-support score
shape_confidence_min_sig_frac: 0.05
