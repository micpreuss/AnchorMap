# AnchorMap — synthetic GenomicSEM .rds route example (self-contained end-to-end smoke).
# Drives the full engine straight from a GenomicSEM ldsc() artifact (no rg long-TSV, no separate
# trait x trait summary): the .rds reader derives both the long-table and the redundancy matrix.
# Run: anchor_map --config synthetic_rds --out-dir results/synthetic_rds
# (fixtures are shipped with the package; regenerate via inst/fixtures/make_synthetic_ldsc.R)
#
# The .rds-derived trait x trait block has 100% coverage, so `vif_correlation: auto` selects
# trait_rg (no fallback). Outputs the same two TSVs as the TSV route.

run_label: synthetic_rds

# ---- input: GenomicSEM .rds (Input C) instead of rg_long + trait_rg_matrix ----
rds: fixtures/synthetic_ldsc_panel.rds
ontology: fixtures/synthetic_panel_ontology.tsv
out_dir: results/synthetic_rds

# ---- partition of the joint .rds: cluster factors vs panel traits ----
cluster_factor_pattern: "^C[0-9]"      # C0, C1, C5_sub0 -> factors; everything else -> panel traits

# ---- trait universe / LDSC reliability gate ----
trait_group: disease
require_ldsc_converged: true
drop_negative_h2: true
h2_z_threshold: 4.0

# ---- ontology: anthro-style trait_id join, single class level ----
ontology_key: trait_id
levels: [anthro_class]
primary_level: anthro_class
min_category_n: 3

# ---- competitive enrichment ----
rank_variable: abs_z
permutation_K: 2000
random_seed: 1
vif_correlation: auto                  # self-selecting: trait_rg (100% coverage) -> proxy -> VIF=1
vif_coverage_min: 0.5

# ---- over-representation ----
hit_abs_rg: 0.2
hit_bonferroni: true

# ---- auto-label rule ----
label_q_max: 0.05
label_auc_min: 0.60

# ---- anchor shape ----
shape_margin_sharp: 0.10
shape_margin_diffuse: 0.05
shape_focus_diffuse: 3.0

# ---- Phase 6: uncertainty quantification (additive) ----
emit_uncertainty: true        # false -> legacy Phase-5 column contracts (byte-for-byte parity)
auc_ci_method: delong         # delong (nonparametric) | hanley (closed form)
auc_ci_level: 0.95
shape_confidence_B: 2000      # MC draws for the shape-support score
shape_confidence_min_sig_frac: 0.05
