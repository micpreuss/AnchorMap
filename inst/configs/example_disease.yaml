# AnchorMap — EXAMPLE config: comprehensive disease track via the rg long-table (Input A).
# Scores every cluster across three ontology levels. Two kinds of things to adapt to YOUR data:
#   1) the input PATHS in the first block (rg_long / ontology / out_dir);
#   2) the SETTINGS that must match your column names/values — trait_group, ontology_key, levels,
#      primary_level (flagged "match to your data" below).
# A coherent, runnable example PAIR ships with the package and matches this disease track exactly:
#   inst/fixtures/example_rg_long.tsv   (3 clusters x 9 disease traits; the 12-column long-table)
#   inst/fixtures/example_ontology.tsv  (trait_category -> domain -> icd_chapter, the join target)
# Run it as-is (no editing) to see the trait_category -> domain anchoring:
#   anchor_map --config example_disease \
#     --rg-long inst/fixtures/example_rg_long.tsv --ontology inst/fixtures/example_ontology.tsv \
#     --out-dir results/example_disease --threads 4
# (-> C0 Endocrine-metabolic [sharp], C1 Circulatory [sharp], C2 ambiguous). For your own run, edit:
#   anchor_map --config example_disease.yaml --out-dir results/disease --threads 4

run_label: example_disease

# ---- inputs: paths to YOUR files ----
# A: cluster x trait rg long-table. trait_category must match the ontology's join key (see the
#    runnable example pair above: inst/fixtures/example_rg_long.tsv + example_ontology.tsv).
rg_long: path/to/cluster_trait_rg_long.tsv
# Disease ontology keyed on trait_category, with domain + icd_chapter levels and an
# anchor_eligible flag (FALSE categories can be scored but never become an auto_label).
ontology: path/to/disease_ontology.tsv
out_dir: results/example_disease

# ---- trait universe / LDSC reliability gate (match to your data) ----
trait_group: disease            # a value present in your long-table's trait_group column
require_ldsc_converged: true
drop_negative_h2: true
h2_z_threshold: 4.0

# ---- ontology: join key + levels to score (match to YOUR ontology's columns) ----
ontology_key: trait_category    # the column shared by long-table & ontology (trait_id or trait_category)
levels: [native, domain, icd_chapter]   # ontology column(s) to score — must exist in your ontology TSV
primary_level: domain                    # which of `levels` drives the auto-label
min_category_n: 3

# ---- competitive enrichment ----
rank_variable: abs_z
permutation_K: 2000
random_seed: 1
vif_correlation: auto
vif_coverage_min: 0.5
# trait_rg_matrix: path/to/trait_trait_rg.summary.tsv
trait_rg_require_converged: true
vif_min_rho: 0.0

# ---- over-representation (Fisher) ----
hit_abs_rg: 0.2
hit_bonferroni: true

# ---- auto-label rule ----
label_q_max: 0.05
label_auc_min: 0.60

# ---- anchor shape ----
shape_margin_sharp: 0.10
shape_margin_diffuse: 0.05
shape_focus_diffuse: 3.0

# ---- Phase 6: uncertainty quantification (additive) ----
# Appends a redundancy-aware 95% CI to every AUC (auc_abs_se/ci_lo/ci_hi) and a Monte-Carlo support
# score to every anchor-shape call (shape_confidence, anchor_focus_ci_lo/hi, shape_posterior,
# shape_jackknife_stable). Set emit_uncertainty: false to reproduce the Phase-5 contracts exactly.
emit_uncertainty: true
auc_ci_method: delong         # delong (nonparametric) | hanley (closed form)
auc_ci_level: 0.95
shape_confidence_B: 2000      # MC draws for the shape-support score
shape_confidence_min_sig_frac: 0.05
