name: CI

# Runs on every push and pull request so ordinary development can't silently regress `main`.
# (The Docker image is built/published separately, on version tags, by publish-container.yml.)
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests + smoke
    runs-on: ubuntu-latest
    env:
      # Avoid BLAS oversubscription (project convention); drive parallelism via --threads only.
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat
          dependencies: '"all"'

      - name: Install the package
        run: R CMD INSTALL .

      - name: Run testthat suite
        run: Rscript -e 'testthat::test_local(stop_on_failure = TRUE)'

      - name: Engine smoke run (synthetic .rds route)
        run: |
          Rscript inst/scripts/anchor_map.R --config synthetic_rds --out-dir results/ci --threads 2

      - name: Assert engine output + positive control
        run: |
          Rscript -e '
            scores <- "results/ci/category_anchor_scores.tsv"
            labs   <- "results/ci/cluster_anchor_labels.tsv"
            stopifnot(file.exists(scores), file.exists(labs))
            L <- read.delim(labs, stringsAsFactors = FALSE)
            row <- L[L$cluster_label == "C5_sub0", ]
            stopifnot(nrow(row) == 1,
                      grepl("anthro", row$auto_label, ignore.case = TRUE),
                      identical(row$anchor_shape, "sharp"))
            cat("OK: C5_sub0 ->", row$auto_label, "[", row$anchor_shape, "]\n")
          '

      - name: Figures smoke run (reads engine out-dir via --in-dir)
        run: |
          Rscript inst/scripts/plot_anchors.R --config synthetic_rds_plots \
            --in-dir results/ci --out-dir results/ci/figures

      - name: Assert figures were written
        run: |
          Rscript -e '
            figs <- list.files("results/ci/figures", pattern = "[.]png$", full.names = TRUE)
            cat("figures:", length(figs), "\n")
            stopifnot(length(figs) >= 1)
          '
