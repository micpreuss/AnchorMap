name: Publish container

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ghcr.io/micpreuss/anchormap

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          image_version="${GITHUB_REF_NAME#v}"
          package_version="$(awk -F ': *' '$1 == "Version" { print $2 }' DESCRIPTION)"
          if [[ "$image_version" != "$package_version" ]]; then
            echo "Tag version $image_version does not match DESCRIPTION version $package_version" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=auto
          tags: type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=AnchorMap
            org.opencontainers.image.description=Correlation-aware ontology anchoring for latent genetic cluster factors
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/micpreuss/AnchorMap

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
