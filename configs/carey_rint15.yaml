# AnchorMap — Carey RINT-15 DISEASE track (comprehensive oracle: all clusters x 3 levels x many categories).
# Reuses the parent cluster_anchoring config verbatim; only paths adapted (see anthro config header).

run_label: carey_rint15

# ---- inputs ----
rg_long: "/Users/mpreuss/Library/Mobile Documents/com~apple~CloudDocs/Desktop/projects/Northwell/project/UKBB_CLUSTER_GWAS/scripts/FinnGen_PheWAS_RG/results/carey_rint_tuned_15clusters_neff_max_empirical_covz/rg/cluster_trait_rg_long_with_p.tsv"
ontology: ontology/category_ontology.tsv
out_dir: results/carey_rint15

# ---- trait universe / LDSC reliability gate ----
trait_group: disease
require_ldsc_converged: true
drop_negative_h2: true
h2_z_threshold: 4.0

# ---- ontology levels to score ----
ontology_key: trait_category
levels: [native, domain, icd_chapter]
primary_level: domain
min_category_n: 3

# ---- competitive enrichment ----
rank_variable: abs_z
permutation_K: 2000
random_seed: 1
vif_correlation: trait_rg
trait_rg_matrix: "/Users/mpreuss/Library/Mobile Documents/com~apple~CloudDocs/Desktop/projects/Northwell/project/UKBB_CLUSTER_GWAS/data/finngen_rg/finngen_R12_FIN.ldsc.summary.tsv"
trait_rg_require_converged: true
vif_min_rho: 0.0

# ---- over-representation ----
hit_abs_rg: 0.2
hit_bonferroni: true

# ---- auto-label rule ----
label_q_max: 0.05
label_auc_min: 0.60

# ---- anchor shape ----
shape_margin_sharp: 0.10
shape_margin_diffuse: 0.05
shape_focus_diffuse: 3.0
